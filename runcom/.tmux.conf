# ============================================
# tmux configuration
# ============================================

# --- Plugin Manager (tpm) ---
set -g @plugin 'tmux-plugins/tpm'

# --- Plugins ---
set -g @plugin 'tmux-plugins/tmux-sensible'      # Sane defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-yank'           # System clipboard
set -g @plugin 'tmux-plugins/tmux-pain-control'   # Better pane navigation
set -g @plugin 'tmux-plugins/tmux-sessionist'     # Session management
set -g @plugin 'dracula/tmux'                     # Dracula theme

# --- General Settings ---
set -g mouse on                                   # Enable mouse support
set -g base-index 1                               # Start windows at 1
setw -g pane-base-index 1                         # Start panes at 1
set -g renumber-windows on                        # Renumber windows on close
set -g set-clipboard on                           # Use system clipboard
set -g allow-passthrough on                       # Let escape sequences reach Ghostty (notifications, etc.)
set -g monitor-activity on                        # Highlight windows with activity
set -g monitor-bell on                            # Highlight windows with bell
set -g visual-activity off                        # Don't show activity messages (status bar highlight is enough)
set -g default-terminal "tmux-256color"           # 256 color support
set -ag terminal-overrides ",xterm-256color:RGB"  # True color support

# --- Prefix ---
# Change prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Key Bindings ---
# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Plugin Settings ---

# Resurrect: also save/restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Continuum: auto-restore on tmux start
set -g @continuum-restore 'on'

# Dracula theme
set -g @dracula-show-powerline true
set -g @dracula-plugins "battery cpu-usage ram-usage time"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-time-format "%H:%M"
set -g @dracula-day-month true

# --- Initialize tpm (must be last) ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'

# --- Post-plugin overrides (must be after tpm) ---
# Session switcher popup (fzf) — overrides sessionist's g binding
unbind g
bind g display-popup -w 60% -h 60% -b rounded -T " Sessions " -E \
  "tmux list-sessions -F '#{session_last_attached} #{session_name}' | sort -rn | awk '{print \$2}' | fzf \
    --reverse \
    --no-info \
    --prompt '  ' \
    --pointer '▶' \
    --color 'bg:#282a36,fg:#f8f8f2,hl:#bd93f9,pointer:#ff79c6,prompt:#50fa7b,header:#6272a4,border:#6272a4' \
    --border rounded \
    --padding 1 \
    --preview 'tmux list-windows -t {} -F \"  #{window_index}: #{window_name} #{@workmux_status}\"' \
    --preview-window right,40%,border-left \
  | xargs tmux switch-client -t"

# Workmux: persist agent status icons in window names across detach/reattach
# Dracula sets these formats, so we override after tpm to add workmux status
set -g window-status-format "#[fg=#f8f8f2]#[bg=#44475a] #I #W#{?@workmux_status, #{@workmux_status},}#{?window_flags,#[fg=#6272a4]#{window_flags},}"
set -g window-status-current-format "#[fg=#44475a]#[bg=#6272a4]#[fg=#f8f8f2]#[bg=#6272a4] #I #W#{?@workmux_status, #{@workmux_status},}#{?window_flags,#[fg=#bd93f9]#{window_flags},} #[fg=#6272a4]#[bg=#44475a]"
